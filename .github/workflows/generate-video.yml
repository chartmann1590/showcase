name: Generate Promo Video

on:
  schedule:
    - cron: "0 2 * * 0"   # every Sunday at 02:00 UTC (after daily catalog update)
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install Pillow edge-tts requests

      - name: Generate catalog (latest repos)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate-catalog.py

      - name: Generate video
        run: python scripts/generate-video.py

      - name: Upload video to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="promo-video"
          # Create release if it doesn't exist, ignore error if it already does
          gh release create "$TAG" \
            --title "Promo Video" \
            --notes "Auto-generated promotional video. Regenerated weekly." \
            --repo ${{ github.repository }} 2>/dev/null || true
          # Upload (overwrite) the video and poster
          gh release upload "$TAG" assets/video/promo.mp4 --clobber \
            --repo ${{ github.repository }}
          gh release upload "$TAG" assets/video/poster.png --clobber \
            --repo ${{ github.repository }}
          echo "VIDEO_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/promo.mp4" >> $GITHUB_ENV
          echo "POSTER_URL=https://github.com/${{ github.repository }}/releases/download/$TAG/poster.png" >> $GITHUB_ENV

      - name: Update video_meta.json in repo
        run: |
          echo "{\"video\": \"$VIDEO_URL\", \"poster\": \"$POSTER_URL\", \"updated\": \"$(date +%Y-%m-%d)\"}" > video_meta.json
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add video_meta.json
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "video: update promo metadata $(date +%Y-%m-%d)"
            git push
          )
